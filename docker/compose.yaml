# Deployment via Docker Compose, designed for Git-based deploy in dockhand
# (build images on deploy). Code + dependencies come from the image (see
# docker/Dockerfile); only the secret file is bind-mounted from the host.
#
# Requirements:
#   - Docker + Docker Compose v2
#   - TIME_ZONE provided via environment (dockhand env panel) or an env file
#   - external Docker network (here: web_net) or adjust the networks block
#   - secrets.yaml present at the host path mounted below

services:
  fritzdect2mqtt:
    build:
      context: ..                  # repository root
      dockerfile: docker/Dockerfile
    image: fritzdect2mqtt:local
    container_name: fritzdect2mqtt
    restart: unless-stopped
    mem_limit: 128m                # guardrail (normal operation ~40-70 MB)
    networks:
      - web_net
    working_dir: /opt/fritzdect2mqtt
    volumes:
      # Only the secret stays on the host (never committed to Git, not baked
      # into the image). Everything else comes from the image.
      - /opt/docker-data/fritzdect2mqtt/secrets.yaml:/opt/fritzdect2mqtt/secrets.yaml:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - TZ=${TIME_ZONE}
      - MALLOC_ARENA_MAX=2
      - MALLOC_TRIM_THRESHOLD_=100000
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  web_net:
    external: true
