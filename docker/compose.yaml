# Reale Deployment-Konfiguration (Docker Compose auf einem Linux-Host).
# Entspricht dem produktiv laufenden Stack. Der Code wird per Bind-Mount
# eingebunden; Abhaengigkeiten werden beim Start aus requirements.txt
# installiert (kein eigenes Image noetig).
#
# Voraussetzungen:
#   - Docker + Docker Compose v2
#   - .env mit TIME_ZONE (siehe .env.example)
#   - ein externes Docker-Netzwerk (hier: web_net) ODER diesen Block anpassen
#   - Projektcode + secrets.yaml im unten gemounteten Host-Verzeichnis

services:
  fritzdect2mqtt:
    image: python:3.14.2-slim
    container_name: fritzdect2mqtt
    restart: unless-stopped
    mem_limit: 128m                      # Guardrail (Normalbetrieb ~40-70 MB)
    networks:
      - web_net
    working_dir: /opt/fritzdect2mqtt
    volumes:
      - /opt/docker-data/fritzdect2mqtt:/opt/fritzdect2mqtt:rw   # Projektcode + secrets.yaml
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - TZ=${TIME_ZONE}
      - MALLOC_ARENA_MAX=2               # begrenzt glibc-malloc-Arenen (RAM)
      - MALLOC_TRIM_THRESHOLD_=100000    # gibt freigegebenen Speicher ans OS zurueck
    command: >
      sh -c "
      pip install --no-cache-dir -r requirements.txt &&
      python FritzDect2MQTT.py
      "
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  web_net:
    external: true
